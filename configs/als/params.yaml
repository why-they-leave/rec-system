# configs/als/params.yaml
# src/modeling/als/model.py, src/modeling/als/evaluate.py 공통 설정.
# 아래 split_date/cold_threshold/als 하이퍼파라미터는 원래 프로젝트에서 실제 사용한 값(사용자 제공).
# 경로만 이 리포의 현재 모듈 구조(src/modeling/als/, scripts/)에 맞게 바꿨다.

# # 데이터마트 생성 (원본 로그 data/raw/ → data/processed/als_events.csv)
# python scripts/build_processed_data.py

# # 학습
# python -m src.modeling.als.model --dataset full
# python -m src.modeling.als.model --dataset us

# # 평가 (params.yaml의 k_list 사용)
# python -m src.modeling.als.evaluate --dataset full

# # 평가 (K 직접 지정)
# python -m src.modeling.als.evaluate --dataset full --k 5 10 20 50

split_date: "2025-08-01"   # 이 날짜 이전=train, 이후=test — 마트에 이 날짜 이후 데이터도 포함돼 있어야 test셋이 생김
cold_threshold: 10         # train 이벤트 수가 10 미만이면 cold 유저로 분류
top_n: 100                 # 유저당 저장할 최대 추천 수 (평가 시 k 조정 가능)

# als 하이퍼파라미터: notebooks/20260703_ML_als_hyperparameter_tuning.ipynb 그리드서치 결과 반영 (2026-07-03)
# 주의: test set 기반 탐색적 튜닝 결과이므로 잠정치. 확정 전 validation split 재검증 필요.
als:
  factors: 16
  iterations: 20
  alpha: 0.5        # total_score에 가중치가 반영되어 있어 낮은 alpha가 유리했음 (그리드서치 결과)
  regularization: 10.0
  random_state: 42

eval:
  k_list: [5, 10, 20]
