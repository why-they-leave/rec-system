# configs/twiddler/params.yaml
# src/modeling/twiddler/rerank.py 하이퍼파라미터 설정.
# Rule 1(페르소나 카테고리 가중치) / Rule 2(노출 이력 패널티) 관련 값.
# backend/api/services/persona_service.py, exposure_service.py,
# backend/api/routers/recommend_main.py, recommend_detail.py가 이 값을
# src.modeling.twiddler.rerank의 동일 이름 상수로 import해서 그대로 쓴다.
#
# Rule 3(저노출 상품 최소 노출 보장)은 제거했다 — 유저 페르소나와 무관한 아이템 공급측
# 형평성 장치라 연구질문(해석가능성/가치관 반영/탐색비용 감소)과 무관했고, 실측 결과
# detail_cf.csv 기준 소스 상품의 88.2%에서 강제 개입이 발생하는데도 정작 후보 풀에 아예
# 없는 상품(카탈로그의 19.5%)은 여전히 커버하지 못해 실효성이 낮았다.
#
# Rule 1/2는 노트북(20260708_ML_twiddler_final_design.ipynb) 검증을 거쳐 세그먼트 평균이 아니라
# 유저 단위 개인화 값(persona_service.get_user_affinity/get_user_alpha/get_user_decay)을 쓴다.

num_categories: 7          # data/dashboard/products.csv 기준 카테고리 종류 수 (균등분포 baseline用)

# Rule 1 — 페르소나 카테고리 가중치 (유저 단위 개인화)
base_alpha: 1.5            # 가중치 강도 배율(persona_service.get_user_alpha가 유저 개인의
                            # dominant_purchase_category_ratio x (1-exploration_tendency)에 곱해 최종 alpha를 만든다)
multiplier_floor: 0.3      # 가중치 배율 하한(점수가 0에 가까워지는 것 방지)
multiplier_ceiling: 1.7    # 가중치 배율 상한(2 - multiplier_floor, floor와 대칭 유도).
                            # 개인화 alpha에는 원래 상한이 없어 로열티가 매우 높은 유저가 세그먼트
                            # 평균보다 훨씬 강하게 한 카테고리에 쏠리는 문제가 있었음 — 이를 완화.

# Rule 2 — 노출 이력 패널티 (유저 단위 개인화)
exposure_decay: 0.7        # 페르소나 데이터가 없는 유저에 한해 쓰는 fallback 고정값
exploration_decay_min: 0.5 # 탐색성향이 가장 높은(percentile rank=1) 유저의 감쇠율 — 빨리 잊음(다양성↑)
exploration_decay_max: 0.85 # 탐색성향이 가장 낮은(percentile rank=0) 유저의 감쇠율 — 천천히 잊음
                            # exploration_tendency의 percentile rank(균등분포)를 입력으로 써서
                            # population 평균 감쇠가 항상 exposure_decay(0.7) 근방에 고정되도록 한다
                            # (원값을 그대로 쓰면 분포 쏠림 때문에 평균이 한쪽으로 치우쳐 역효과가 남 — 검증됨)

# twiddler=after 요청 시 top_n의 몇 배를 후보 풀로 가져올지(Rule 2가 재배치할 여지를 줌)
pool_multiplier: 3
